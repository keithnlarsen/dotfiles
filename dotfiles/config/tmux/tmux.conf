# ─────────────────────────────────────────────────────────────────────────
#  tmux — the multiplexer that owns the IDE layout. Lean, vi-flavored, Dracula.
#  Prefix is Ctrl-a. Reload with  prefix r.  Cheatsheet with  prefix ?
# ─────────────────────────────────────────────────────────────────────────

# ── Prefix: Ctrl-b → Ctrl-a (easier to reach) ──────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Sane defaults ──────────────────────────────────────────────────────────
set -g mouse on                 # click panes, drag borders, scroll
set -g base-index 1             # windows start at 1
setw -g pane-base-index 1       # panes start at 1
set -g renumber-windows on      # keep window numbers gapless
set -sg escape-time 10          # snappy ESC in nvim
set -g history-limit 50000
set -g focus-events on          # let nvim know when its pane is focused
set -g set-clipboard on
setw -g mode-keys vi            # vi keys in copy-mode

# ── True color (so Dracula looks right in nvim) ────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",alacritty:RGB"

# ── Splits keep the current directory; intuitive | and - ───────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Vim-aware pane navigation:  prefix h/j/k/l  and  prefix arrows ──────────
# If the focused pane is running Neovim, forward the key into it — vim-tmux-
# navigator moves the nvim split, or hands back to tmux at the split edge.
# Otherwise just switch tmux panes. nvim side: config/nvim/lua/plugins/tmux-navigator.lua
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?\\g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind Left  if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind Down  if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind Up    if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind Right if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# ── Repeatable pane resize:  prefix H/J/K/L (hold to repeat) ───────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy-mode (vi): v select, y yank to macOS clipboard ────────────────────
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ── Reload config ──────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded ✓"

# ── Layout safety ──────────────────────────────────────────────────────────
# Default prefix+Space = next-layout, which scrambles a custom layout. Repurpose
# it to RESTORE the IDE layout that `ide` saved (@ide_layout). No-op if unset.
unbind Space
bind Space run-shell 'L=$(tmux show -wqv @ide_layout); [ -n "$L" ] && tmux select-layout "$L" && tmux display "IDE layout restored ✓" || tmux display "no saved layout (run ide)"'

# ── Cheatsheet popup:  prefix ?  (2-column, floating, Dracula-colored) ──────
bind ? display-popup -E -w 192 -h 52 "~/.config/tmux/cheatsheet.sh | less -R"

# ── Dracula status bar (hand-written, no plugin) ───────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1d1e26,fg=#f8f8f2"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left  "#[bg=#bd93f9,fg=#1d1e26,bold] #S #[bg=#1d1e26,fg=#1d1e26] "
set -g status-right "#[fg=#6272a4]#{pane_current_command} #[fg=#8be9fd]%a %Y-%m-%d #[fg=#ff79c6,bold]%H:%M "
setw -g window-status-format         "#[fg=#6272a4] #I:#W "
setw -g window-status-current-format "#[fg=#1d1e26,bg=#50fa7b,bold] #I:#W "
set -g pane-border-style        "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"
set -g message-style "bg=#bd93f9,fg=#1d1e26,bold"
set -g mode-style    "bg=#44475a,fg=#f8f8f2"
