# Alacritty — the GPU canvas. No tabs (tmux does multiplexing). Keep this lean.
# Edit + save reloads live (live_config_reload), so you can tweak and see it instantly.

[general]
import              = ["~/.config/alacritty/themes/dracula-darker.toml"]
live_config_reload  = true

[env]
TERM = "xterm-256color"

[window]
padding         = { x = 10, y = 8 }
dynamic_padding = true
decorations     = "full"        # try "buttonless" for a cleaner frameless look later
opacity         = 0.98          # subtle; set 1.0 for fully solid
option_as_alt   = "Both"        # makes the macOS Option key send Alt (useful in tmux/nvim)
startup_mode    = "Maximized"  # open full-size so `ide` builds at the real window size

[font]
size   = 16.0
normal = { family = "JetBrainsMono Nerd Font Mono", style = "Regular" }
bold   = { family = "JetBrainsMono Nerd Font Mono", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font Mono", style = "Italic" }

[cursor]
style = { shape = "Block", blinking = "On" }

[scrolling]
history = 10000

# Launch straight into the IDE: `ide` builds the 5-pane layout as the session's
# only window (named "IDE"), or reattaches if it's already running — so there's
# never a stray bare-shell window to clean up. When you detach (Ctrl-a d) or kill
# the session, `exec zsh -l` drops you into a plain shell instead of closing the
# window. Re-enter with  ide  (reattaches) or  tmux a.
# Full path: a non-interactive login shell doesn't source ~/.zshrc, so ~/.local/bin
# (where the `ide` symlink lives) isn't on PATH yet.
[terminal.shell]
program = "/bin/zsh"
args    = ["-l", "-c", "~/.local/bin/ide; exec zsh -l"]
