# Dracula (darker background) — the single source of truth for the whole IDE's
# colors. tmux, nvim, the agent pane and the bottom terminal all inherit these
# 16 colors, so the look stays cohesive everywhere.

[colors.primary]
background        = "#1d1e26"
foreground        = "#f8f8f2"
dim_foreground    = "#9a9a9a"
bright_foreground = "#ffffff"

[colors.cursor]
text   = "#1d1e26"
cursor = "#f8f8f2"

[colors.vi_mode_cursor]
text   = "#1d1e26"
cursor = "#bd93f9"

[colors.selection]
text       = "CellForeground"
background = "#44475a"

[colors.search.matches]
foreground = "#1d1e26"
background = "#50fa7b"

[colors.search.focused_match]
foreground = "#1d1e26"
background = "#ffb86c"

# Normal (the bright Dracula accents)
[colors.normal]
black   = "#21222c"
red     = "#ff5555"
green   = "#50fa7b"
yellow  = "#f1fa8c"
blue    = "#bd93f9"
magenta = "#ff79c6"
cyan    = "#8be9fd"
white   = "#f8f8f2"

[colors.bright]
black   = "#6272a4"
red     = "#ff6e6e"
green   = "#69ff94"
yellow  = "#ffffa5"
blue    = "#d6acff"
magenta = "#ff92df"
cyan    = "#a4ffff"
white   = "#ffffff"
